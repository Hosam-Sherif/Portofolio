<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Hossam Sherif</title>
    <meta name="robots" content="noindex">

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2306152b'/%3E%3Ctext x='50' y='68' font-family='Poppins, Arial, sans-serif' font-weight='700' font-size='48' fill='%2300c3ff' text-anchor='middle'%3EHS%3C/text%3E%3C/svg%3E">

    <style>
        .not-found {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .not-found h1 {
            font-size: clamp(80px, 20vw, 160px);
            font-weight: 700;
            background: linear-gradient(135deg, #00c3ff, #0056ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .not-found h2 { margin-top: 10px; font-size: 24px; }
        .not-found p { color: var(--text-secondary); margin: 15px 0 30px; max-width: 400px; }
    </style>
</head>
<body>

    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            const useLight = savedTheme ? savedTheme === 'light' : prefersLight;
            if (useLight) document.body.classList.add('light-mode');
        })();
    </script>

    <div class="not-found">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/Portofolio/" style="text-decoration: none;">
            <button class="btn primary"><i class="fas fa-arrow-left"></i> Back to Home</button>
        </a>
    </div>

</body>
</html>
